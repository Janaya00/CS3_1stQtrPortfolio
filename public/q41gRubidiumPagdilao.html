<!DOCTYPE html>
<html lang="en">
<title>Add a Movie</title>


<style>
  body {
    font-family: Arial;
    background: #f3f3f3;
  }

  .container{
    width: 500px;
    margin: 50px
    padding: 100px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
  flex-direction: column;
  align-items: center;

  }

  input, select{
    width: 90%;
    padding: 10px;
    margin: 10px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
     
  }

  button{
    width: 95%;
    padding: 10px;
    margin: 15px 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  .stars span{
    margin: 5px;
    font-size: 30px;
    color: gray;
    cursor: pointer;
  }

  .active{
    color: gold;
  }

  h2 {
    color: #333;
    text-align: center;
  }

  label {
    color: #555;
    font-weight: bold;
    margin: 10px;
  }

</style>
</head>

<body>

  <div class ="container">

    <h2>Add a Movie</h2>

    <label>Title:</label>
    <input type="text">

    <label>Year:</label>
    <input type="number">

    <label>Genre:</label>
    <select>
      <option>Romance</option>
      <option>Action</option>
      <option>Sci-Fi</option>
      <option>Comedy</option>
      <option>Horror</option>
    </select>

    <label>Rating:</label>
    <div class="stars"> 
    <span onclick="rate(1)">&#9733;</span>
    <span onclick="rate(2)">&#9733;</span>
    <span onclick="rate(3)">&#9733;</span>
    <span onclick="rate(4)">&#9733;</span>
    <span onclick="rate(5)">&#9733;</span>
  </div>

  <br>
  
  <button> Add Movie </button>

  <h2>Movie List</h2>


<script></script>


</body>
</html>
