<!DOCTYPE html>
<html lang="en">
<head>
<title>Add a Movie</title>

<style>
  body {
    font-family: Arial;
    background: #f3f3f3;
  }

  .container{
    width: 500px;
    margin: 50px;
    padding: 50px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
  }

  input, select{
    width: 90%;
    padding: 10px;
    margin: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button{
    width: 95%;
    padding: 10px;
    margin: 15px 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  .stars span{
    font-size: 30px;
    color: gray;
    cursor: pointer;
  }

  .active{
    color: gold;
  }
</style>
</head>

<body>

<div class="container">

  <h2>Add a Movie</h2>

  <label>Title:</label>
  <input type="text" id="title">

  <label>Year:</label>
  <input type="number" id="year">

  <label>Genre:</label>
  <select id="genre">
    <option>Romance</option>
    <option>Action</option>
    <option>Sci-Fi</option>
    <option>Comedy</option>
    <option>Horror</option>
  </select>

  <label>Rating:</label>
  <div class="stars"> 
    <span onclick="rate(1)">★</span>
    <span onclick="rate(2)">★</span>
    <span onclick="rate(3)">★</span>
    <span onclick="rate(4)">★</span>
    <span onclick="rate(5)">★</span>
  </div>

  <button onclick="addMovie()">Add Movie</button>

  <h2>Movie List</h2>
  <div id="movieList"></div>

</div>

<script>
let rating = 0;

function rate(stars) {
  rating = stars;

  let starElements = document.querySelectorAll(".stars span");

  for (let i = 0; i < starElements.length; i++) {
    if (i < stars) {
      starElements[i].classList.add("active");
    } else {
      starElements[i].classList.remove("active");
    }
  }
}

function addMovie() {

  let movie = {
    title: document.getElementById("title").value,
    year: document.getElementById("year").value,
    genre: document.getElementById("genre").value,
    rating: rating
  };

  let movies;

  if (localStorage.getItem("movies")) {
    movies = JSON.parse(localStorage.getItem("movies"));
  } else {
    movies = [];
  }

  movies.push(movie);

  localStorage.setItem("movies", JSON.stringify(movies));

  displayMovies();
}

function displayMovies() {

  let movieList = document.getElementById("movieList");
  movieList.innerHTML = "";

  let movies;

  if (localStorage.getItem("movies")) {
    movies = JSON.parse(localStorage.getItem("movies"));
  } else {
    movies = [];
  }

  for (let i = 0; i < movies.length; i++) {

    let stars = "★".repeat(movies[i].rating);
    movieList.innerHTML += "<div>" + movies[i].title + " (" + movies[i].year + ") - " + movies[i].genre + ", Rating: " + stars + "</div>";
  }
}
</script>

</body>
</html>
